<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OMR Suite – Private Tools</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      height: 100vh;
      font-family: system-ui, 'Segoe UI', monospace;
      background: #0a0e14;
      color: #e8eef5;
      transition: background 0.2s, color 0.2s;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #151b24;
      border-right: 1px solid #2d3748;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: width 0.25s ease;
      overflow-x: hidden;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .sidebar.collapsed { width: 60px; }
    .sidebar.collapsed .nav-buttons button span,
    .sidebar.collapsed .theme-panel .theme-btn span { display: none; }
    .sidebar.collapsed .nav-buttons button { text-align: center; padding: 0.75rem 0; }
    .sidebar.collapsed .theme-panel { flex-direction: column; align-items: center; gap: 0.5rem; }
    .sidebar.collapsed .theme-panel .theme-btn { padding: 6px; font-size: 1.2rem; }

    .nav-buttons {
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .sidebar button {
      background: transparent;
      border: none;
      color: #9ba6b8;
      padding: 0.75rem 1.5rem;
      text-align: left;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      transition: 0.1s;
    }
    .sidebar button:hover { background: #1f2937; color: #00e5ff; }
    .sidebar button.active { background: #00e5ff20; color: #00e5ff; border-left: 3px solid #00e5ff; }

    .toggle-btn {
      background: transparent;
      border: none;
      color: #9ba6b8;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0.75rem;
      margin: 0.5rem 1rem 0 auto;
      display: block;
      width: auto;
    }
    .toggle-btn:hover { color: #00e5ff; }
    .sidebar.collapsed .toggle-btn { margin: 0.5rem auto 0 auto; }

    .theme-panel {
      padding: 1rem 1.5rem;
      border-top: 1px solid #2d3748;
      display: flex;
      gap: 0.5rem;
      transition: all 0.2s;
    }
    .theme-btn {
      background: #1f2937;
      border: none;
      border-radius: 30px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      color: white;
    }
    .theme-btn.active { background: #00e5ff; color: #0a0e14; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      background: #151b24;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      border-bottom: 1px solid #2d3748;
      flex-shrink: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0a0e14;
      flex: 1;
    }

    /* Custom scrollbar – themed */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #1e2937; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #3b4b62; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #5c6f8c; }
    .force-light ::-webkit-scrollbar-track { background: #e2e8f0 !important; }
    .force-light ::-webkit-scrollbar-thumb { background: #94a3b8 !important; }
    .force-light ::-webkit-scrollbar-thumb:hover { background: #64748b !important; }
    .force-dark ::-webkit-scrollbar-track { background: #1e2937 !important; }
    .force-dark ::-webkit-scrollbar-thumb { background: #3b4b62 !important; }
    * { scrollbar-width: thin; }
    .force-light { scrollbar-color: #94a3b8 #e2e8f0 !important; }
    .force-dark { scrollbar-color: #3b4b62 #1e2937 !important; }

    /* Universal theme overrides */
    .force-light, .force-light * { background-color: #ffffff !important; color: #000000 !important; }
    .force-light button, .force-light .theme-btn { background-color: #e0e0e0 !important; color: #000000 !important; border-color: #cccccc !important; }
    .force-light a, .force-light a * { color: #0000ee !important; }
    .force-dark, .force-dark * { background-color: #1a1a1a !important; color: #f5e6a3 !important; border-color: #444444 !important; }
    .force-dark a, .force-dark a * { color: #ffcc66 !important; }

    /* Key entry overlay */
    .key-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .key-card {
      background: #1f2937;
      padding: 2rem;
      border-radius: 16px;
      text-align: center;
      max-width: 500px;
    }
    .key-card input { width: 100%; padding: 0.75rem; margin: 1rem 0; }
    .key-card button { background: #00e5ff; color: #0a0e14; border: none; padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; }
    .status-text { margin: 1rem 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div style="display: flex; flex-direction: column; flex: 1;">
      <div style="display: flex; justify-content: flex-end;">
        <button class="toggle-btn" id="toggleSidebarBtn" title="Collapse/Expand">◀</button>
      </div>
      <div class="nav-buttons">
        <button data-tool="tool1">📝 <span>OMR Grader</span></button>
        <button data-tool="tool2">✂️ <span>PDF Auto Crop</span></button>
        <button data-tool="tool3">🖼️ <span>Image → PDF</span></button>
        <button data-tool="tool4">🔑 <span>Answer Key Generator</span></button>
      </div>
    </div>
    <div class="theme-panel">
      <button class="theme-btn" data-theme="light">☀️ <span>Light</span></button>
      <button class="theme-btn" data-theme="dark">🌙 <span>Dark</span></button>
      <button class="theme-btn" data-theme="disabled">🚫 <span>Disable</span></button>
    </div>
  </div>
  <div class="main">
    <div class="toolbar">Select a tool →</div>
    <iframe id="toolFrame" src="about:blank"></iframe>
  </div>

  <div id="keyOverlay" class="key-overlay" style="display: none;">
    <div class="key-card">
      <h3>🔐 Decryption Key Required</h3>
      <p>Enter the decryption key to access tools.</p>
      <input type="password" id="keyInput" placeholder="Base64 key">
      <div><button id="submitKeyBtn">Unlock & Load</button></div>
      <div id="loadingStatus" class="status-text"></div>
    </div>
  </div>

  <script>
    // ==================== CONFIGURATION ====================
    // Dynamically detect base path (e.g., "/a4_50_bgd_omr/")
    const basePath = window.location.pathname.replace(/\/[^/]*$/, '') || '';
    const LIBRARIES = [
      `${basePath}/libs/opencv.js`,
      `${basePath}/libs/pdf.min.js`,
      `${basePath}/libs/pdf.worker.min.js`,
      `${basePath}/libs/xlsx.full.min.js`,
      `${basePath}/libs/jszip.min.js`,
      `${basePath}/libs/pdf-lib.min.js`,
      `${basePath}/libs/jspdf.umd.min.js`
    ];
    const ENCRYPTED_TOOLS = {
      tool1: `${basePath}/encrypted/tool1.html.enc`,
      tool2: `${basePath}/encrypted/tool2.html.enc`,
      tool3: `${basePath}/encrypted/tool3.html.enc`,
      tool4: `${basePath}/encrypted/tool4.html.enc`
    };
    // ======================================================

    let currentDecryptionKey = null;
    let librariesCached = false;
    let activeTool = 'tool1';
    let currentTheme = localStorage.getItem('appTheme') || 'disabled';

    // --- DOM elements ---
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleSidebarBtn');
    const navButtons = document.querySelectorAll('.nav-buttons button');
    const themeBtns = document.querySelectorAll('.theme-btn');
    const iframe = document.getElementById('toolFrame');
    const keyOverlay = document.getElementById('keyOverlay');
    const keyInput = document.getElementById('keyInput');
    const submitKeyBtn = document.getElementById('submitKeyBtn');
    const loadingStatus = document.getElementById('loadingStatus');

    // --- Sidebar collapse ---
    let isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
    function setSidebarCollapsed(collapsed) {
      isCollapsed = collapsed;
      if (collapsed) {
        sidebar.classList.add('collapsed');
        toggleBtn.innerHTML = '▶';
      } else {
        sidebar.classList.remove('collapsed');
        toggleBtn.innerHTML = '◀';
      }
      localStorage.setItem('sidebarCollapsed', collapsed);
    }
    toggleBtn.addEventListener('click', () => setSidebarCollapsed(!isCollapsed));
    setSidebarCollapsed(isCollapsed);

    // --- Theme handling (parent + iframe) ---
    function applyThemeToParent(theme) {
      document.body.classList.remove('force-light', 'force-dark');
      if (theme === 'light') document.body.classList.add('force-light');
      else if (theme === 'dark') document.body.classList.add('force-dark');
    }
    function setThemeActive(theme) {
      themeBtns.forEach(btn => {
        if (btn.dataset.theme === theme) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }
    function broadcastTheme(theme) {
      currentTheme = theme;
      localStorage.setItem('appTheme', theme);
      setThemeActive(theme);
      applyThemeToParent(theme);
      if (iframe.contentWindow && iframe.src !== 'about:blank') {
        iframe.contentWindow.postMessage({ type: 'theme-change', theme }, '*');
      }
    }
    themeBtns.forEach(btn => {
      btn.addEventListener('click', () => broadcastTheme(btn.dataset.theme));
    });

    // --- Cache libraries ---
    async function cacheAllLibraries() {
      const cache = await caches.open('omr-libs');
      const toFetch = LIBRARIES.map(url => new Request(url, { cache: 'reload' }));
      await cache.addAll(toFetch);
      librariesCached = true;
    }

    async function loadLibrary(url) {
      const cache = await caches.open('omr-libs');
      let response = await cache.match(url);
      if (!response) {
        response = await fetch(url);
        if (response.ok) await cache.put(url, response.clone());
      }
      const blob = await response.blob();
      const script = document.createElement('script');
      script.src = URL.createObjectURL(blob);
      document.head.appendChild(script);
      return new Promise(resolve => { script.onload = resolve; });
    }

    // --- Decrypt tool HTML ---
    async function decryptTool(encryptedUrl, keyBytes) {
      const response = await fetch(encryptedUrl);
      const encryptedBlob = await response.arrayBuffer();
      const nonce = encryptedBlob.slice(0, 12);
      const ciphertext = encryptedBlob.slice(12);
      const cryptoKey = await crypto.subtle.importKey(
        'raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']
      );
      const plaintext = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: nonce }, cryptoKey, ciphertext
      );
      return new TextDecoder().decode(plaintext);
    }

    // --- Load a tool into iframe (with path fixing) ---
    async function loadTool(toolId) {
      if (!currentDecryptionKey) throw new Error('No key');
      const encryptedUrl = ENCRYPTED_TOOLS[toolId];
      let htmlContent = await decryptTool(encryptedUrl, currentDecryptionKey);
      
      // Fix relative library paths for blob URL
      // Replace "../libs/" with the correct absolute path
      const fixedBase = basePath ? basePath + '/' : '/';
      htmlContent = htmlContent.replace(/\.\.\/libs\//g, fixedBase + 'libs/');
      
      const blob = new Blob([htmlContent], { type: 'text/html' });
      const blobUrl = URL.createObjectURL(blob);
      iframe.src = blobUrl;
      iframe.onload = () => {
        URL.revokeObjectURL(blobUrl);
        iframe.onload = null;
        // Re-send current theme to the newly loaded iframe
        iframe.contentWindow.postMessage({ type: 'theme-change', theme: currentTheme }, '*');
      };
    }

    // --- Main initialization after key provided ---
    async function initializeWithKey(keyBase64) {
      loadingStatus.innerText = '🔑 Decoding key...';
      let keyBytes;
      try {
        keyBytes = Uint8Array.from(atob(keyBase64), c => c.charCodeAt(0));
        if (keyBytes.length !== 32) throw new Error('Invalid key length');
      } catch(e) {
        loadingStatus.innerText = '❌ Invalid base64 key. Please check.';
        return;
      }
      currentDecryptionKey = keyBytes;
      localStorage.setItem('omr_key', keyBase64);
      loadingStatus.innerText = '📦 Caching libraries (one time)...';
      await cacheAllLibraries();
      loadingStatus.innerText = '📚 Loading libraries...';
      for (const lib of LIBRARIES) {
        await loadLibrary(lib);
      }
      loadingStatus.innerText = '✅ Ready! Loading tools...';
      keyOverlay.style.display = 'none';
      const lastTool = localStorage.getItem('lastTool') || 'tool1';
      activeTool = lastTool;
      await loadTool(activeTool);
      navButtons.forEach(btn => {
        if (btn.dataset.tool === activeTool) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    // --- Check saved key ---
    async function checkSavedKey() {
      const savedKey = localStorage.getItem('omr_key');
      if (savedKey) {
        keyOverlay.style.display = 'flex';
        loadingStatus.innerText = '🔐 Saved key found. Unlocking...';
        await initializeWithKey(savedKey);
      } else {
        keyOverlay.style.display = 'flex';
        loadingStatus.innerText = 'Enter decryption key to continue.';
      }
    }

    submitKeyBtn.addEventListener('click', async () => {
      const key = keyInput.value.trim();
      if (!key) return;
      await initializeWithKey(key);
    });

    // --- Tool navigation ---
    navButtons.forEach(btn => {
      btn.addEventListener('click', async () => {
        const toolId = btn.dataset.tool;
        if (!toolId) return;
        if (!currentDecryptionKey) {
          alert('Decryption key not ready yet. Please reload.');
          return;
        }
        activeTool = toolId;
        localStorage.setItem('lastTool', toolId);
        await loadTool(toolId);
        navButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // --- Listen for theme requests from iframe ---
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'theme-request') {
        event.source.postMessage({ type: 'theme-change', theme: currentTheme }, '*');
      }
    });

    // --- Service Worker registration (optional, skip if fails) ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW registration failed:', err));
    }

    // --- Start ---
    applyThemeToParent(currentTheme);
    setThemeActive(currentTheme);
    checkSavedKey();
  </script>
</body>
</html>
