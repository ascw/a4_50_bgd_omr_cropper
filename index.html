<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OMR Suite</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* same styling as before – keep it */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      height: 100vh;
      font-family: system-ui, 'Segoe UI', monospace;
      background: #0a0e14;
      color: #e8eef5;
      transition: background 0.2s, color 0.2s;
      overflow: hidden;
    }
    .sidebar {
      width: 260px;
      background: #151b24;
      border-right: 1px solid #2d3748;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: width 0.25s ease;
      overflow-x: hidden;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .sidebar.collapsed { width: 60px; }
    .sidebar.collapsed .nav-buttons button span,
    .sidebar.collapsed .theme-panel .theme-btn span { display: none; }
    .sidebar.collapsed .nav-buttons button { text-align: center; padding: 0.75rem 0; }
    .sidebar.collapsed .theme-panel { flex-direction: column; align-items: center; gap: 0.5rem; }
    .nav-buttons {
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .sidebar button {
      background: transparent;
      border: none;
      color: #9ba6b8;
      padding: 0.75rem 1.5rem;
      text-align: left;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: 0.1s;
    }
    .sidebar button:hover { background: #1f2937; color: #00e5ff; }
    .sidebar button.active { background: #00e5ff20; color: #00e5ff; border-left: 3px solid #00e5ff; }
    .toggle-btn {
      background: transparent;
      border: none;
      color: #9ba6b8;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0.75rem;
      margin: 0.5rem 1rem 0 auto;
      display: block;
      width: auto;
    }
    .toggle-btn:hover { color: #00e5ff; }
    .theme-panel {
      padding: 1rem 1.5rem;
      border-top: 1px solid #2d3748;
      display: flex;
      gap: 0.5rem;
    }
    .theme-btn {
      background: #1f2937;
      border: none;
      border-radius: 30px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      color: white;
    }
    .theme-btn.active { background: #00e5ff; color: #0a0e14; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      background: #151b24;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      border-bottom: 1px solid #2d3748;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0a0e14;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #1e2937; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #3b4b62; border-radius: 4px; }
    .force-light ::-webkit-scrollbar-track { background: #e2e8f0 !important; }
    .force-light ::-webkit-scrollbar-thumb { background: #94a3b8 !important; }
    .force-dark ::-webkit-scrollbar-track { background: #1e2937 !important; }
    .force-dark ::-webkit-scrollbar-thumb { background: #3b4b62 !important; }
    * { scrollbar-width: thin; }
    .force-light { scrollbar-color: #94a3b8 #e2e8f0 !important; }
    .force-dark { scrollbar-color: #3b4b62 #1e2937 !important; }
    .force-light, .force-light * { background-color: #ffffff !important; color: #000000 !important; }
    .force-light button, .force-light .theme-btn { background-color: #e0e0e0 !important; color: #000000 !important; }
    .force-light a, .force-light a * { color: #0000ee !important; }
    .force-dark, .force-dark * { background-color: #1a1a1a !important; color: #f5e6a3 !important; border-color: #444444 !important; }
    .force-dark a, .force-dark a * { color: #ffcc66 !important; }
    .key-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .key-card {
      background: #1f2937;
      padding: 2rem;
      border-radius: 16px;
      text-align: center;
      max-width: 500px;
    }
    .key-card input { width: 100%; padding: 0.75rem; margin: 1rem 0; }
    .key-card button { background: #00e5ff; color: #0a0e14; border: none; padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; }
    .status-text { margin: 1rem 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div style="display: flex; flex-direction: column; flex: 1;">
      <div style="display: flex; justify-content: flex-end;">
        <button class="toggle-btn" id="toggleSidebarBtn">◀</button>
      </div>
      <div class="nav-buttons">
        <button data-tool="tool1">📝 <span>OMR Grader</span></button>
        <button data-tool="tool2">✂️ <span>PDF Auto Crop</span></button>
        <button data-tool="tool3">🖼️ <span>Image → PDF</span></button>
        <button data-tool="tool4">🔑 <span>Answer Key Generator</span></button>
      </div>
    </div>
    <div class="theme-panel">
      <button class="theme-btn" data-theme="light">☀️ <span>Light</span></button>
      <button class="theme-btn" data-theme="dark">🌙 <span>Dark</span></button>
      <button class="theme-btn" data-theme="disabled">🚫 <span>Disable</span></button>
    </div>
  </div>
  <div class="main">
    <div class="toolbar">Select a tool →</div>
    <iframe id="contentFrame" src="tool1.html"></iframe>
  </div>
  <div id="keyOverlay" class="key-overlay" style="display: none;">
    <div class="key-card">
      <h3>🔐 Decryption Key Required</h3>
      <p>Enter the decryption key to unlock tools.</p>
      <input type="password" id="keyInput" placeholder="Base64 key">
      <div><button id="submitKeyBtn">Unlock</button></div>
      <div id="loadingStatus" class="status-text"></div>
    </div>
  </div>
  <script>
    (function() {
      const BASE_PATH = '/a4_50_bgd_omr'; // adjust if different

      // Sidebar toggle
      const sidebar = document.getElementById('sidebar');
      const toggleBtn = document.getElementById('toggleSidebarBtn');
      const navButtons = document.querySelectorAll('.nav-buttons button');
      const themeBtns = document.querySelectorAll('.theme-btn');
      const iframe = document.getElementById('contentFrame');
      const keyOverlay = document.getElementById('keyOverlay');
      const keyInput = document.getElementById('keyInput');
      const submitBtn = document.getElementById('submitKeyBtn');
      const loadingStatus = document.getElementById('loadingStatus');

      let isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
      function setSidebarCollapsed(collapsed) {
        isCollapsed = collapsed;
        if (collapsed) {
          sidebar.classList.add('collapsed');
          toggleBtn.innerHTML = '▶';
        } else {
          sidebar.classList.remove('collapsed');
          toggleBtn.innerHTML = '◀';
        }
        localStorage.setItem('sidebarCollapsed', collapsed);
      }
      toggleBtn.addEventListener('click', () => setSidebarCollapsed(!isCollapsed));
      setSidebarCollapsed(isCollapsed);

      // Theme handling
      let currentTheme = localStorage.getItem('appTheme') || 'disabled';
      function applyThemeToParent(theme) {
        document.body.classList.remove('force-light', 'force-dark');
        if (theme === 'light') document.body.classList.add('force-light');
        else if (theme === 'dark') document.body.classList.add('force-dark');
      }
      function setThemeActive(theme) {
        themeBtns.forEach(btn => {
          if (btn.dataset.theme === theme) btn.classList.add('active');
          else btn.classList.remove('active');
        });
      }
      function broadcastTheme(theme) {
        currentTheme = theme;
        localStorage.setItem('appTheme', theme);
        setThemeActive(theme);
        applyThemeToParent(theme);
        if (iframe.contentWindow) {
          iframe.contentWindow.postMessage({ type: 'theme-change', theme }, '*');
        }
      }
      themeBtns.forEach(btn => btn.addEventListener('click', () => broadcastTheme(btn.dataset.theme)));

      // Tool navigation
      function setActiveTool(toolId) {
        navButtons.forEach(btn => {
          if (btn.dataset.tool === toolId) {
            btn.classList.add('active');
            iframe.src = `${toolId}.html`;
          } else {
            btn.classList.remove('active');
          }
        });
      }
      navButtons.forEach(btn => btn.addEventListener('click', () => setActiveTool(btn.dataset.tool)));
      const lastTool = localStorage.getItem('lastTool') || 'tool1';
      setActiveTool(lastTool);
      iframe.addEventListener('load', () => {
        const current = iframe.src.split('/').pop().replace('.html', '');
        localStorage.setItem('lastTool', current);
        iframe.contentWindow.postMessage({ type: 'theme-change', theme: currentTheme }, '*');
      });

      // IndexedDB key management (for service worker)
      function openKeyDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open('omr_key_db', 1);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains('keys')) db.createObjectStore('keys');
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }
      async function storeKeyInIndexedDB(keyBase64) {
        const db = await openKeyDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('keys', 'readwrite');
          const store = tx.objectStore('keys');
          store.put(keyBase64, 'aes-key');
          tx.oncomplete = () => {
            db.close();
            resolve();
          };
          tx.onerror = () => reject(tx.error);
        });
      }
      async function checkKeyExists() {
        const db = await openKeyDB();
        return new Promise((resolve) => {
          const tx = db.transaction('keys', 'readonly');
          const store = tx.objectStore('keys');
          const get = store.get('aes-key');
          get.onsuccess = () => {
            resolve(!!get.result);
            db.close();
          };
          get.onerror = () => {
            resolve(false);
            db.close();
          };
        });
      }

      // Reload the page after key is stored, so the SW can use it
      submitBtn.addEventListener('click', async () => {
        const key = keyInput.value.trim();
        if (!key) return;
        loadingStatus.innerText = 'Storing key...';
        try {
          await storeKeyInIndexedDB(key);
          loadingStatus.innerText = 'Key stored. Reloading...';
          setTimeout(() => window.location.reload(), 500);
        } catch(e) {
          loadingStatus.innerText = 'Error storing key.';
        }
      });

      async function checkAndReload() {
        const hasKey = await checkKeyExists();
        if (hasKey) {
          keyOverlay.style.display = 'none';
          // If the iframe already shows a 404, force reload it to trigger SW interception
          iframe.src = iframe.src;
        } else {
          keyOverlay.style.display = 'flex';
        }
      }

      applyThemeToParent(currentTheme);
      setThemeActive(currentTheme);
      
      // Register service worker with explicit scope
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(`${BASE_PATH}/sw.js`, { scope: `${BASE_PATH}/` })
          .then(reg => {
            console.log('SW registered with scope:', reg.scope);
            // Wait for SW to be ready before reloading iframe
            if (reg.active) {
              checkAndReload();
            } else {
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'activated') checkAndReload();
                });
              });
            }
          })
          .catch(err => console.warn('SW registration failed:', err));
      } else {
        console.warn('Service Worker not supported');
        checkAndReload();
      }
    })();
  </script>
</body>
</html>
